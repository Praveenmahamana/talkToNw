turnaround:
  minimum_minutes:
    default: 45
    narrow_body: 45
    wide_body: 90
    regional: 30
    # Aircraft type overrides
    A320: 45
    A321: 45
    A319: 45
    A318: 40
    B737: 45
    B738: 45
    B739: 45
    B736: 45
    B777: 90
    B772: 90
    B773: 90
    B787: 90
    B788: 90
    B789: 90
    A330: 90
    A332: 90
    A333: 90
    A340: 90
    A350: 90
    A359: 90
    A380: 120
    B747: 120
    B744: 120
    B748: 120
    E190: 35
    E195: 35
    E175: 30
    E170: 30
    CRJ9: 30
    CRJ7: 30
    AT72: 30
    AT75: 30
  # Wide-body aircraft type codes (partial match used)
  wide_body_codes: ["B77", "B78", "A33", "A34", "A35", "A38", "B74", "B76"]
  # Regional aircraft type codes
  regional_codes: ["E17", "E19", "CRJ", "AT7", "DH8", "SF3"]

